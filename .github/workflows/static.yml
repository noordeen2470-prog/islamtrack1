<!DOCTYPE html>
<html>
<head>
  <title>Islamic Routine Tracker</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Islamic Routine Tracker">
<meta property="og:description" content="Track your daily Islamic habits بسهولة 📊">

<meta property="og:image" content="https://github.com/noordeen2470-prog/islamtrack1/blob/bc83c55b1a85ac783a1d510b608ff562e9d693b3/.github/preview.png">
<meta property="og:url" content="https://noordeen2470-prog.github.io/islamictraker2/">
<meta property="og:type" content="website">

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: #ffffff;
  color: #111;
}


h1 {
  text-align: center;
  color: #15803d;
  position: sticky;
  top: 0;
  background: #ffffff;
  z-index: 100;
  padding: 10px;
  margin: 0;
  font-size: 18px;
}

/* ✅ PROGRESS BAR STYLE */
.progress-container {
  margin: 10px 0;
}
.progress-bg {
  background:#e5e7eb;
  border-radius:10px;
  overflow:hidden;
  height:14px;
}
.progress-fill {
  height:100%;
  width:0%;
  background:#16a34a;
  transition: width 0.5s ease-in-out;
}
.progress-text {
  text-align:center;
  font-size:13px;
  margin-top:5px;
  color:#065f46;
}

.date-bar {
  text-align: center;
  margin: 10px 0;
}

input, button {
  padding: 6px;
  margin: 5px;
  font-size: 14px;
}

button {
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 5px;
}

.table-container {
  width: 100%;
  height: 75vh;
  overflow: auto;
  border: 1px solid #ccc;
  -webkit-overflow-scrolling: touch;
}

table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  font-size: 12px;
  text-align: center;
}

th {
  background: #dcfce7;
  color: #065f46;
  position: sticky;
  top: 0;
  z-index: 2;
}

td:first-child, th:first-child {
  position: sticky;
  left: 0;
  background: #f9fafb;
  z-index: 3;
  text-align: left;
  font-weight: bold;

  white-space: normal;
  word-break: break-word;
  line-height: 1.5;

  min-width: 320px;
  max-width: 420px;
}

th:first-child {
  z-index: 4;
  background: #dcfce7;
}

input[type="checkbox"] {
  transform: scale(1.3);
  accent-color: #16a34a;
  cursor: pointer;
}

.footer {
  margin-top: 15px;
  text-align: center;
  font-size: 13px;
  color: #065f46;
  font-style: italic;
}

@media (max-width: 768px) {
  h1 { font-size: 15px; }

  th, td {
    font-size: 11px;
    padding: 6px;
  }

  td:first-child, th:first-child {
    min-width: 220px;
    max-width: 240px;
  }
}
</style>
</head>

<body>

<h1>
📊 Islamic Routine Tracker<br>
<span id="dateRange"></span>
</h1>

<!-- ✅ PROGRESS BAR UI -->
<div class="progress-container">
  <div class="progress-bg">
    <div id="progressFill" class="progress-fill"></div>
  </div>
  <div id="progressText" class="progress-text">0% Completed</div>
</div>

<div class="date-bar">
  From: <input type="date" id="startDate">
  To: <input type="date" id="endDate">
  <button onclick="generateTable()">Apply</button>
</div>

<div class="table-container">
  <table id="trackerTable"></table>
</div>

<div class="footer">
“The most beloved deeds to Allah are those that are consistent, even if small.”
</div>

<script>

const habits = [ /* SAME YOUR HABITS (unchanged) */
"Wake up: Alhamdulillahilladhi ahyana ba’da ma amatana wa ilayhin nushur",
"Fajr (2 Sunnah + 2 Fard)",

"After Fard (Fajr): SubhanAllah 33 / Alhamdulillah 33 / Allahu Akbar 34",
"After Fard (Fajr): La ilaha illallahu wahdahu la sharika lahu, lahul mulku wa lahul hamdu, wa huwa ‘ala kulli shay’in qadeer (10x)",
"After Fard (Fajr): Ayat al-Kursi",
"After Fard (Fajr): Allahumma a‘inni ‘ala dhikrika wa shukrika wa husni ‘ibadatika",
"After Fard (Fajr): Allahumma inni as’aluka ‘ilman nafi‘an, wa rizqan tayyiban, wa ‘amalan mutaqabbalan (3x)",
"After Fard (Fajr): Allahumma inni as’aluka al-jannata wa a’uthu bika minan nar (3x)",

"Dhuhr (2 Sunnah + 2 Sunnah + 4 Fard + 2 Sunnah)",

"After Fard (Dhuhr): SubhanAllah 33 / Alhamdulillah 33 / Allahu Akbar 34",
"After Fard (Dhuhr): La ilaha illallahu wahdahu la sharika lahu, lahul mulku wa lahul hamdu, wa huwa ‘ala kulli shay’in qadeer (1x)",
"After Fard (Dhuhr): Ayat al-Kursi",
"After Fard (Dhuhr): Allahumma a‘inni ‘ala dhikrika wa shukrika wa husni ‘ibadatika",
"After Fard (Dhuhr): Allahumma inni as’aluka al-jannata wa a’uthu bika minan nar (3x)",

"Asr (4 Fard)",

"After Fard (Asr): SubhanAllah 33 / Alhamdulillah 33 / Allahu Akbar 34",
"After Fard (Asr): La ilaha illallahu wahdahu la sharika lahu, lahul mulku wa lahul hamdu, wa huwa ‘ala kulli shay’in qadeer (1x)",
"After Fard (Asr): Ayat al-Kursi",
"After Fard (Asr): Allahumma a‘inni ‘ala dhikrika wa shukrika wa husni ‘ibadatika",
"After Fard (Asr): Allahumma inni as’aluka al-jannata wa a’uthu bika minan nar (3x)",

"Maghrib (3 Fard + 2 Sunnah)",

"After Fard (Maghrib): SubhanAllah 33 / Alhamdulillah 33 / Allahu Akbar 34",
"After Fard (Maghrib): La ilaha illallahu wahdahu la sharika lahu, lahul mulku wa lahul hamdu, wa huwa ‘ala kulli shay’in qadeer (10x)",
"After Fard (Maghrib): Ayat al-Kursi",
"After Fard (Maghrib): Allahumma a‘inni ‘ala dhikrika wa shukrika wa husni ‘ibadatika",
"After Fard (Magrib): Allahumma inni as’aluka al-jannata wa a’uthu bika minan nar (3x)",

"Isha (4 Fard + 2 Sunnah + 2 Nafl + Witr)",

"After Fard (Isha): SubhanAllah 33 / Alhamdulillah 33 / Allahu Akbar 34",
"After Fard (Isha): La ilaha illallahu wahdahu la sharika lahu, lahul mulku wa lahul hamdu, wa huwa ‘ala kulli shay’in qadeer (1x)",
"After Fard (Isha): Ayat al-Kursi",
"After Fard (Isha): Allahumma a‘inni ‘ala dhikrika wa shukrika wa husni ‘ibadatika",
"After Fard (Isha): Allahumma inni as’aluka al-jannata wa a’uthu bika minan nar (3x)",

"Before Sleep: Cup your hands together and blow into them after reciting Surah Al-Ikhlas, Surah Al-Falaq, and Surah An-Nas, then wipe your hands over your body. Repeat 3 times",
"Before Sleep: Ayat al-Kursi",
"Before Sleep: Surah Al-Kafirun",
"Before Sleep: Surah Al-Mulk",
"Before Sleep: Last 2 verses of Surah Al-Baqarah",
"Before Sleep: SubhanAllah 33 / Alhamdulillah 33 / Allahu Akbar 34",
"Before Sleep: Allahumma aslamtu nafsi ilayka, wa fawwadtu amri ilayka, wa wajjahtu wajhi ilayka, wa alja’tu zahri ilayka, raghbatan wa rahbatan ilayka, la malja’a wa la manja minka illa ilayka, amantu bikitabika allathee anzalta, wa binabiyyika allathee arsalta",
"Before Sleep: Allahumma a‘inni ‘ala dhikrika wa shukrika wa husni ‘ibadatika",
"Before Sleep: Allahumma bismika amutu wa ahya",

"Sleep on right side",
"Pray Istikhara (2 rak'ah) for guidance (compulsory daily)",
"Friday: Surah Al-Kahf (reminder)" 
];

function saveCheck(dateKey, habitIndex, value) {
  localStorage.setItem(dateKey + "_" + habitIndex, value);
}

function loadCheck(dateKey, habitIndex) {
  return localStorage.getItem(dateKey + "_" + habitIndex) === "true";
}

/* ✅ PROGRESS FUNCTION */
function updateProgress() {
  const total = document.querySelectorAll("input[type='checkbox']").length;
  const checked = document.querySelectorAll("input[type='checkbox']:checked").length;
  const percent = total ? Math.round((checked / total) * 100) : 0;

  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText = percent + "% Completed";
}

function generateTable() {

  const table = document.getElementById("trackerTable");
  table.innerHTML = "";

  const startInput = document.getElementById("startDate").value;
  const endInput = document.getElementById("endDate").value;

  const start = new Date(startInput);
  const end = new Date(endInput);

  localStorage.setItem("startDate", startInput);
  localStorage.setItem("endDate", endInput);

  let days = [];
  let temp = new Date(start);

  while (temp <= end) {
    days.push(new Date(temp));
    temp.setDate(temp.getDate() + 1);
  }

  const options = { day: '2-digit', month: 'short', year: 'numeric' };
  document.getElementById("dateRange").innerText =
    start.toLocaleDateString('en-GB', options) + " – " +
    end.toLocaleDateString('en-GB', options);

  let header = "<tr><th>Routine (WHEN + WHAT)</th>";

  days.forEach(d => {
    header += "<th>" + d.getDate() + "</th>";
  });

  header += "</tr>";
  table.innerHTML += header;

  habits.forEach((habit, habitIndex) => {
    let row = "<tr><td>" + habit + "</td>";

    days.forEach((d) => {
      let dateKey = d.toISOString().split('T')[0];
      let checked = loadCheck(dateKey, habitIndex) ? "checked" : "";

      row += `<td>
        <input type='checkbox' ${checked}
        onchange="saveCheck('${dateKey}', ${habitIndex}, this.checked); updateProgress();">
      </td>`;
    });

    row += "</tr>";
    table.innerHTML += row;
  });

  updateProgress();
}

window.onload = function() {

  let savedStart = localStorage.getItem("startDate") || "2026-04-09";
  let savedEnd = localStorage.getItem("endDate") || "2026-05-09";

  document.getElementById("startDate").value = savedStart;
  document.getElementById("endDate").value = savedEnd;

  generateTable();
};

</script>

</body>
</html>
